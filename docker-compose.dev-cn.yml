version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai4se-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai4se
      POSTGRES_USER: ${DB_USER:-ai4se_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-ai4se_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai4se-network

  intent-tester:
    build:
      context: .
      dockerfile: tools/intent-tester/docker/Dockerfile
    container_name: ai4se-intent-tester
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-ai4se_user}:${DB_PASSWORD:-change_me_in_production}@postgres:5432/ai4se
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-please-change}
      - MIDSCENE_SERVER_URL=http://host.docker.internal:3001
      - FLASK_ENV=${FLASK_ENV:-production}
    ports:
      - "5001:5001"
    volumes:
      - ./tools/intent-tester/frontend/static/screenshots:/app/frontend/static/screenshots
      - ./logs:/app/logs
      - ./tools/intent-tester:/app/tools/intent-tester
      - ./tools/shared:/app/tools/shared
      - ./assistant-bundles:/app/assistant-bundles
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai4se-network

  new-agents:
    image: nginx:alpine
    container_name: ai4se-new-agents
    restart: unless-stopped
    volumes:
      - ./tools/new-agents/frontend/dist:/usr/share/nginx/html/new-agents
      - ./tools/new-agents/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ai4se-network

  new-agents-backend:
    build:
      context: .
      dockerfile: tools/new-agents/backend/docker/Dockerfile
    container_name: ai4se-new-agents-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-ai4se_user}:${DB_PASSWORD:-change_me_in_production}@postgres:5432/ai4se
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai4se-network

  nginx:
    image: nginx:alpine
    container_name: ai4se-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./tools/frontend/dist:/app/tools/frontend/dist:ro
    depends_on:
      - intent-tester
      - new-agents
      - new-agents-backend
    networks:
      - ai4se-network

volumes:
  postgres_data:
    driver: local

networks:
  ai4se-network:
    name: ai4se-network
