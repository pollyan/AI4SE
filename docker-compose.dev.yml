x-proxy: &proxy
  http_proxy: "http://192.168.5.2:7897"
  https_proxy: "http://192.168.5.2:7897"
  no_proxy: "localhost,127.0.0.1,postgres,intent-tester,intent-execution-proxy"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai4se-db
    restart: unless-stopped
    environment:
      <<: *proxy
      POSTGRES_DB: ai4se
      POSTGRES_USER: "${DB_USER:?DB_USER is required}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U ${DB_USER:?DB_USER is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ai4se-network]

  intent-tester:
    build:
      context: .
      dockerfile: tools/intent-tester/docker/Dockerfile
      target: web
    container_name: ai4se-intent-tester
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${DB_USER:?DB_USER is required}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/ai4se"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY is required}"
      AI4SE_ENV: development
      INTENT_ACCESS_MODE: local-dev
      INTENT_EXECUTION_ENABLED: "true"
      INTENT_PUBLIC_ORIGIN: http://127.0.0.1:5001
      INTENT_PROXY_TOPOLOGY: managed
      INTENT_PROXY_TOKEN: "${INTENT_PROXY_TOKEN:?INTENT_PROXY_TOKEN is required}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:?OPENAI_API_KEY is required}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:?OPENAI_BASE_URL is required}"
      MIDSCENE_MODEL_NAME: "${MIDSCENE_MODEL_NAME:?MIDSCENE_MODEL_NAME is required}"
      MIDSCENE_SERVER_URL: http://intent-execution-proxy:3001
      FLASK_ENV: development
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./tools/intent-tester:/app/tools/intent-tester
      - ./tools/shared:/app/tools/shared
      - ./assistant-bundles:/app/assistant-bundles
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks: [ai4se-network]

  intent-execution-proxy:
    build:
      context: .
      dockerfile: tools/intent-tester/docker/Dockerfile
      target: proxy
    container_name: ai4se-intent-execution-proxy
    restart: unless-stopped
    environment:
      INTENT_PROXY_TOPOLOGY: managed
      INTENT_PROXY_TOKEN: "${INTENT_PROXY_TOKEN:?INTENT_PROXY_TOKEN is required}"
      INTENT_PUBLIC_ORIGIN: http://127.0.0.1:5001
      OPENAI_API_KEY: "${OPENAI_API_KEY:?OPENAI_API_KEY is required}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:?OPENAI_BASE_URL is required}"
      MIDSCENE_MODEL_NAME: "${MIDSCENE_MODEL_NAME:?MIDSCENE_MODEL_NAME is required}"
      MAIN_APP_URL: http://intent-tester:5001/intent-tester/api
      PORT: "3001"
    depends_on:
      intent-tester:
        condition: service_started
    networks: [ai4se-network]

  new-agents:
    image: nginx:alpine
    container_name: ai4se-new-agents
    restart: unless-stopped
    volumes:
      - ./tools/new-agents/frontend/dist:/usr/share/nginx/html/new-agents
      - ./tools/new-agents/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks: [ai4se-network]

  new-agents-backend:
    build:
      context: .
      dockerfile: tools/new-agents/backend/docker/Dockerfile
    container_name: ai4se-new-agents-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${DB_USER:?DB_USER is required}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/ai4se"
      NEW_AGENTS_DEFAULT_LLM_API_KEY: "${NEW_AGENTS_DEFAULT_LLM_API_KEY:-}"
      NEW_AGENTS_DEFAULT_LLM_BASE_URL: "${NEW_AGENTS_DEFAULT_LLM_BASE_URL:-}"
      NEW_AGENTS_DEFAULT_LLM_MODEL: "${NEW_AGENTS_DEFAULT_LLM_MODEL:-}"
      NEW_AGENTS_DEFAULT_LLM_DESCRIPTION: "${NEW_AGENTS_DEFAULT_LLM_DESCRIPTION:-}"
      PROXY_API_KEY: "${PROXY_API_KEY:-}"
    volumes:
      - ./tools/new-agents/backend:/app
      - ./tools/new-agents/workflow_manifest.json:/workflow_manifest.json:ro
      - ./tools/new-agents/professional_methods.json:/professional_methods.json:ro
      - ./tools/new-agents/prompt_regression_samples.json:/prompt_regression_samples.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [ai4se-network]

  nginx:
    image: nginx:alpine
    container_name: ai4se-gateway
    restart: unless-stopped
    environment:
      <<: *proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./tools/frontend/dist:/app/tools/frontend/dist:ro
    depends_on:
      - intent-tester
      - new-agents
      - new-agents-backend
    networks: [ai4se-network]

volumes:
  postgres_data:
    driver: local

networks:
  ai4se-network:
    name: ai4se-network
