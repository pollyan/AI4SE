services:
  postgres:
    image: postgres:15-alpine
    container_name: intent-test-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: intent_test
      POSTGRES_USER: "${DB_USER:?DB_USER is required}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U ${DB_USER:?DB_USER is required}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-app:
    build:
      context: ../../..
      dockerfile: tools/intent-tester/docker/Dockerfile
      target: web
    container_name: intent-test-web
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${DB_USER:?DB_USER is required}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/intent_test"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY is required}"
      AI4SE_ENV: development
      INTENT_ACCESS_MODE: local-dev
      INTENT_EXECUTION_ENABLED: "true"
      INTENT_PUBLIC_ORIGIN: http://127.0.0.1:5001
      INTENT_PROXY_TOPOLOGY: managed
      INTENT_PROXY_TOKEN: "${INTENT_PROXY_TOKEN:?INTENT_PROXY_TOKEN is required}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:?OPENAI_API_KEY is required}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:?OPENAI_BASE_URL is required}"
      MIDSCENE_MODEL_NAME: "${MIDSCENE_MODEL_NAME:?MIDSCENE_MODEL_NAME is required}"
      MIDSCENE_SERVER_URL: http://intent-execution-proxy:3001
      FLASK_ENV: development
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ../frontend/static/screenshots:/app/tools/intent-tester/frontend/static/screenshots
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

  intent-execution-proxy:
    build:
      context: ../../..
      dockerfile: tools/intent-tester/docker/Dockerfile
      target: proxy
    container_name: intent-execution-proxy
    restart: unless-stopped
    environment:
      INTENT_PROXY_TOPOLOGY: managed
      INTENT_PROXY_TOKEN: "${INTENT_PROXY_TOKEN:?INTENT_PROXY_TOKEN is required}"
      INTENT_PUBLIC_ORIGIN: http://127.0.0.1:5001
      OPENAI_API_KEY: "${OPENAI_API_KEY:?OPENAI_API_KEY is required}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:?OPENAI_BASE_URL is required}"
      MIDSCENE_MODEL_NAME: "${MIDSCENE_MODEL_NAME:?MIDSCENE_MODEL_NAME is required}"
      MAIN_APP_URL: http://web-app:5001/intent-tester/api
      PORT: "3001"
    depends_on:
      web-app:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: intent-test-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../frontend/static:/usr/share/nginx/html/static:ro
    depends_on:
      - web-app
    profiles: [production]

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: intent-test-network
