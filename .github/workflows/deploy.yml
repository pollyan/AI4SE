name: Deploy to Tencent Cloud via SCP/SSH

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '跳过测试直接部署 (仅用于紧急修复)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - 'production'

jobs:
  # ====================================
  # 阶段 1a: Backend API 测试 (Intent Tester & New Agents)
  # ====================================
  backend-api-test:
    name: Backend API Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r tools/new-agents/backend/requirements.txt
        pip install pytest pytest-cov
    
    - name: 🧪 Run Intent Tester tests
      run: |
        echo "::group::Running Intent Tester API Tests"
        export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/tools/intent-tester
        python -m pytest tools/intent-tester/tests/ -v --cov=tools/intent-tester/backend --cov-report=term --cov-report=xml --cov-fail-under=50
        echo "::endgroup::"
        
    - name: 📤 Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        
    - name: 🧪 Run New Agents Backend tests
      run: |
        echo "::group::Running New Agents Backend Tests"
        cd tools/new-agents/backend
        python -m pytest tests/ -v -c pytest.ini
        echo "::endgroup::"
  
  # ====================================
  # 阶段 1b-3: Common Frontend 测试
  # ====================================
  common-frontend-test:
    name: Common Frontend Tests (Homepage/Profile)
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Lint and Build
      run: |
        echo "::group::Running Common Frontend Lint and Build"
        cd tools/frontend
        npm ci
        npm run lint
        npm run build
        echo "::endgroup::"

  # ====================================
  # 阶段 1b-4: New Agents Frontend 测试
  # ====================================
  new-agents-frontend-test:
    name: New Agents Frontend Tests
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install and Test
      run: |
        echo "::group::Running New Agents Frontend Tests"
        cd tools/new-agents/frontend
        npm ci
        npm run lint
        npm run test
        echo "::endgroup::"

  # ====================================
  # 阶段 1c: 代码质量检查
  # ====================================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📊 Code quality check
      run: |
        echo "::group::Code Quality Analysis"
        pip install flake8
        flake8 tools/intent-tester/backend --count --select=E9,F63,F7,F82 --show-source --statistics
        echo "::endgroup::"

  # ====================================
  # 阶段 1.5: MidScene 代理测试 (Node.js)
  # ====================================
  proxy-test:
    name: MidScene Proxy Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/intent-tester
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        path: '.' # Checkout to current dir (redundant but explicit)
    
    - name: 📥 Relocate for consistency
      run: |
        # Ensure we are in the project root first, though checkout defaults to it
        cd $GITHUB_WORKSPACE
        
    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: 📦 Install dependencies
      run: |
        npm ci
    
    - name: 🧪 Run proxy tests
      run: |
        echo "::group::Running MidScene Proxy Tests"
        npx jest --testPathPatterns="tests/proxy" --passWithNoTests --forceExit
        echo "::endgroup::"

  # ====================================
  # 阶段 2: 构建和部署（SCP/SSH 推送模式）
  # ====================================
  deploy-to-production:
    name: Build and Deploy to Tencent Cloud
    needs: [backend-api-test, common-frontend-test, new-agents-frontend-test, proxy-test]  # 必须等待所有测试完成且成功
    runs-on: ubuntu-latest
    # 生产环境部署必须由人工从 GitHub Actions 手动触发；push/PR 只运行测试门禁。
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🟢 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: 📦 Build proxy package
      run: |
        echo "构建本地代理包..."
        node scripts/ci/build-proxy-package.js
        echo "✅ 代理包构建完成"
        ls -lh dist/intent-test-proxy.zip
    
    - name: ⚛️ Build React frontend (Common - Homepage/Profile)
      run: |
        echo "构建 Common React 前端 (首页/Profile)..."
        cd tools/frontend
        npm ci
        npm run build
        echo "✅ Common React 前端构建完成"
        ls -lh dist/
    
    - name: 📦 Prepare deployment package
      run: |
        echo "准备部署包..."
        
        # 创建部署目录
        mkdir -p deploy-package
        
        # 复制必要的文件（排除不需要的文件）
        rsync -av --progress \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.pytest_cache' \
          --exclude='.coverage' \
          --exclude='logs' \
          --exclude='.env' \
          --exclude='.DS_Store' \
          --exclude='.github' \
          --exclude='.claude' \
          --exclude='.cursor' \
          --exclude='.bmad-core' \
          --exclude='.playwright-mcp' \
          --exclude='deploy-package' \
          ./ deploy-package/
        
        echo "✅ 部署包准备完成"
        
        # 显示包大小
        echo "部署包大小:"
        du -sh deploy-package
    
    - name: 📦 Transfer Files via Rsync
      run: |
        echo "开始传输文件到服务器..."
        
        # 配置 SSH
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        
        # 准备上传目录
        echo "准备接收部署文件..."
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "sudo rm -rf /opt/intent-test-framework-upload-tmp && sudo mkdir -p /opt/intent-test-framework-upload-tmp && sudo chown -R \$USER:\$USER /opt/intent-test-framework-upload-tmp"
        echo "✅ 上传目录已准备完成"
        
        # 使用 rsync 传输文件 (含重试逻辑以防网络抖动中断)
        MAX_RETRIES=5
        RETRY_COUNT=0
        until rsync -avz --progress \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          deploy-package/ \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/intent-test-framework-upload-tmp/
        do
          RETRY_COUNT=$((RETRY_COUNT+1))
          if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
            echo "❌ Rsync 重试次数已达上限，传输彻底失败！"
            exit 1
          fi
          echo "⚠️ Rsync 遇错中断 (可能是网络抖动)。将在 3 秒后执行第 $RETRY_COUNT/$MAX_RETRIES 次重试..."
          sleep 3
        done
        
        echo "✅ 文件传输完成"
        
        # 清理 SSH 密钥
        rm -f ~/.ssh/deploy_key
    
    - name: 🚀 Deploy on Server
      uses: appleboy/ssh-action@v1.0.3
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        NEW_AGENTS_DEFAULT_LLM_API_KEY: ${{ secrets.NEW_AGENTS_DEFAULT_LLM_API_KEY }}
        NEW_AGENTS_DEFAULT_LLM_BASE_URL: ${{ secrets.NEW_AGENTS_DEFAULT_LLM_BASE_URL }}
        NEW_AGENTS_DEFAULT_LLM_MODEL: ${{ secrets.NEW_AGENTS_DEFAULT_LLM_MODEL }}
        NEW_AGENTS_DEFAULT_LLM_DESCRIPTION: ${{ secrets.NEW_AGENTS_DEFAULT_LLM_DESCRIPTION }}
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        timeout: 3600s
        command_timeout: 3600s
        envs: DB_PASSWORD,SECRET_KEY,NEW_AGENTS_DEFAULT_LLM_API_KEY,NEW_AGENTS_DEFAULT_LLM_BASE_URL,NEW_AGENTS_DEFAULT_LLM_MODEL,NEW_AGENTS_DEFAULT_LLM_DESCRIPTION
        script: |
          set -e  # 遇到错误立即退出，防止虚假成功
          
          echo "=========================================="
          echo "🚀 开始部署"
          echo "=========================================="
          
          # 复制上传的文件到部署目录
          echo "📦 同步文件..."
          sudo rsync -a --delete /opt/intent-test-framework-upload-tmp/ /opt/intent-test-framework/
          sudo chown -R $USER:$USER /opt/intent-test-framework
          
          # 切换到部署目录
          cd /opt/intent-test-framework
          
          # ==========================================
          # 步骤1: 配置环境变量
          # ==========================================
          echo "🔧 配置环境变量..."

          require_secret() {
            key="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required GitHub secret: $key"
              exit 1
            fi
          }

          is_managed_env_key() {
            key="$1"
            case "$key" in
              DB_PASSWORD|SECRET_KEY|NEW_AGENTS_DEFAULT_LLM_API_KEY|NEW_AGENTS_DEFAULT_LLM_BASE_URL|NEW_AGENTS_DEFAULT_LLM_MODEL|NEW_AGENTS_DEFAULT_LLM_DESCRIPTION)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          write_env_var() {
            key="$1"
            value="$2"
            printf '%s=%s\n' "$key" "$value" >> .env.managed
          }

          require_secret DB_PASSWORD "$DB_PASSWORD"
          require_secret SECRET_KEY "$SECRET_KEY"
          require_secret NEW_AGENTS_DEFAULT_LLM_API_KEY "$NEW_AGENTS_DEFAULT_LLM_API_KEY"
          require_secret NEW_AGENTS_DEFAULT_LLM_BASE_URL "$NEW_AGENTS_DEFAULT_LLM_BASE_URL"
          require_secret NEW_AGENTS_DEFAULT_LLM_MODEL "$NEW_AGENTS_DEFAULT_LLM_MODEL"

          NEW_AGENTS_DEFAULT_LLM_DESCRIPTION_VALUE="$NEW_AGENTS_DEFAULT_LLM_DESCRIPTION"
          if [ -z "$NEW_AGENTS_DEFAULT_LLM_DESCRIPTION_VALUE" ]; then
            NEW_AGENTS_DEFAULT_LLM_DESCRIPTION_VALUE='GitHub Actions managed default LLM config'
          fi

          rm -f .env.managed

          if [ -f .env ]; then
            echo "✅ .env文件已存在，重建受管配置..."
            while IFS= read -r line || [ -n "$line" ]; do
              key="${line%%=*}"
              if [ "$line" = "$key" ] || ! is_managed_env_key "$key"; then
                printf '%s\n' "$line" >> .env.managed
              fi
            done < .env
          else
            echo "创建新的.env文件..."
            cat > .env.managed << 'ENVEOF'
          DB_USER=intent_user
          FLASK_ENV=production
          ENVEOF
          fi

          write_env_var DB_PASSWORD "$DB_PASSWORD"
          write_env_var SECRET_KEY "$SECRET_KEY"
          write_env_var NEW_AGENTS_DEFAULT_LLM_API_KEY "$NEW_AGENTS_DEFAULT_LLM_API_KEY"
          write_env_var NEW_AGENTS_DEFAULT_LLM_BASE_URL "$NEW_AGENTS_DEFAULT_LLM_BASE_URL"
          write_env_var NEW_AGENTS_DEFAULT_LLM_MODEL "$NEW_AGENTS_DEFAULT_LLM_MODEL"
          write_env_var NEW_AGENTS_DEFAULT_LLM_DESCRIPTION "$NEW_AGENTS_DEFAULT_LLM_DESCRIPTION_VALUE"

          mv .env.managed .env
          chmod 600 .env

          echo "✅ .env 已同步生产必需配置和 New Agents 默认 LLM 配置"
          
          # ==========================================
          # 步骤2: 检查数据库迁移需求
          # ==========================================
          echo "🔍 检查数据库迁移需求..."
          
          NEED_MIGRATION=false
          
          # 检查是否存在旧的langfuse数据库容器
          if docker ps -a --format '{{.Names}}' | grep -q "^langfuse-postgres-1$"; then
            echo "⚠️ 检测到旧的langfuse-postgres-1容器"
            
            # 检查是否已经有新的数据库容器
            if docker ps -a --format '{{.Names}}' | grep -q "^intent-test-db-prod$"; then
              echo "✅ 新数据库容器已存在，跳过迁移"
              NEED_MIGRATION=false
            else
              echo "需要执行数据库迁移"
              NEED_MIGRATION=true
            fi
          else
            echo "✅ 未检测到旧数据库，全新部署"
            NEED_MIGRATION=false
          fi
          
          # ==========================================
          # 步骤3: 执行数据库迁移（如需要）
          # ==========================================
          if [ "$NEED_MIGRATION" = true ]; then
            echo "📊 开始数据库迁移..."
            echo "::group::Database Migration"
            
            # 先启动新的PostgreSQL容器
            echo "启动新的PostgreSQL容器..."
            sudo docker-compose -f docker-compose.prod.yml up -d postgres
            
            # 等待数据库就绪
            echo "等待数据库就绪..."
            sleep 10
            
            # 执行迁移脚本
            chmod +x scripts/migrate_langfuse_to_local.sh
            
            # 非交互模式执行迁移
            if ./scripts/migrate_langfuse_to_local.sh; then
              echo "✅ 数据库迁移成功"
            else
              echo "❌ 数据库迁移失败"
              echo "::endgroup::"
              exit 1
            fi
            
            echo "::endgroup::"
          else
            echo "跳过数据库迁移步骤"
          fi
          
          # ==========================================
          # 步骤4: 检查代理包
          # ==========================================
          echo "📦 检查代理包..."
          if [ -d "dist/intent-test-proxy" ] || [ -f "dist/intent-test-proxy.zip" ]; then
             echo "✅ 代理包已通过 rsync 同步"
             ls -lh dist/intent-test-proxy.zip || true
          else
             echo "⚠️ 警告: dist/intent-test-proxy 未找到"
          fi
          
          # ==========================================
          # 步骤5: 执行部署
          # ==========================================
          # 确保脚本有执行权限
          chmod +x scripts/ci/deploy.sh
          
          # 执行统一部署脚本（生产环境）
          bash scripts/ci/deploy.sh production
          
          echo "=========================================="
          echo "✅ 部署完成"
          echo "=========================================="
    
    - name: 📊 Deployment Summary
      if: success()
      run: |
        echo ""
        echo "=========================================="
        echo "🎉 部署成功！"
        echo "=========================================="
        echo "✅ API 测试已通过"
        echo "✅ 代码已通过 SCP 推送到腾讯云服务器"
        echo "✅ 服务已重启并通过健康检查"
        echo "🌐 访问地址: http://${{ secrets.SERVER_HOST }} (通过 Nginx 80 端口)"
        echo "=========================================="
    
    - name: 📊 Deployment Failed
      if: failure()
      run: |
        echo ""
        echo "=========================================="
        echo "❌ 部署失败"
        echo "=========================================="
        echo "请检查 GitHub Actions 日志以获取详细错误信息"
        echo "如果是服务器端错误，SSH 登录服务器查看日志："
        echo "  ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
        echo "  docker-compose -f /opt/intent-test-framework/docker-compose.prod.yml logs"
        echo "=========================================="
